name: MLOps CI Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: make install

      - name: Run Lint
        run: make lint

      - name: Run Unit Tests
        run: make test

      - name: Train Model
        run: make train

      - name: Verify Model Exists
        run: |
          test -f models/model.pkl
          echo "Model trained successfully!"
